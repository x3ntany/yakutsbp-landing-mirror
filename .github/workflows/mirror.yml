name: Auto-Mirror from Cloudflare to GitHub Pages

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape compiled site and fix SPA
        run: |
          wget --mirror \
               --convert-links \
               --page-requisites \
               --no-parent \
               --no-host-directories \
               -e robots=off \
               -P ./public \
               "https://yakutsbp-landing.pages.dev/" || true
               
          wget -q -O ./public/settings.json "https://yakutsbp-landing.pages.dev/settings.json"
          # wget -q -O ./public/locales/ru.json "https://yakutsbp-landing.pages.dev/locales/ru.json" --force-directories
          cp ./public/index.html ./public/404.html
               
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
          cname: yakutsbp.ru
